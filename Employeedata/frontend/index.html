<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>EMS</h2>
        </div>

        <ul class="menu">

            <li class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                Employees
            </li>

            <li>
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                Settings
            </li>

        </ul>

        <button class="theme-toggle" onclick="toggleTheme()">
            Toggle Theme
        </button>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">

            <div>
                <h1>Employee Dashboard</h1>
                <p>Manage all employees easily</p>
            </div>

            <div class="top-actions">

                <input
                        type="text"
                        id="searchInput"
                        placeholder="Search employee..."
                        onkeyup="searchEmployee()"
                >

            </div>

        </div>

        <!-- DASHBOARD CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Employees</h3>
                <h1 id="totalEmployees">0</h1>
            </div>

            <div class="card">
                <h3>Departments</h3>
                <h1 id="departmentCount">0</h1>
            </div>

            <div class="card">
                <h3>Status</h3>
                <h1>Active</h1>
            </div>

        </div>

        <!-- CONTENT -->
        <div class="content-grid">

            <!-- FORM -->
            <div class="form-container">

                <h2>Add Employee</h2>

                <input type="text" id="name" placeholder="Enter Name">

                <input type="email" id="email" placeholder="Enter Email">

                <input type="text" id="dept" placeholder="Enter Department">

                <button onclick="addEmployee()">
                    Save Employee
                </button>

            </div>

            <!-- TABLE -->
            <div class="table-container">

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Actions</th>
                    </tr>

                    </thead>

                    <tbody id="tableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

    <div class="popup-content">

        <span class="close-btn" onclick="closePopup()">
            &times;
        </span>

        <h2>Edit Employee</h2>

        <input type="text" id="editName">

        <input type="email" id="editEmail">

        <input type="text" id="editDept">

        <button onclick="updateEmployee()">
            Update Employee
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
