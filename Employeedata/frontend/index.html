<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

    <div class="form-section">
        <h2>Add Employee</h2>

         <input type="text" id="name" placeholder="Enter Name">
         <input type="text" id="email" placeholder="Enter Email">
         <input type="text" id="dept" placeholder="Enter Department">

        <button onclick="addEmployee()">Save Employee</button>
    </div>

    <div class="list-section">
        <h2>Employee List</h2>

        <div id="loader" class="loader"></div>

        <ul id="list"></ul>
    </div>

</div>

<script src="script.js"></script>


<div id="popup" class="popup">
    <div class="popup-content fade-in">
        <span class="close-btn" onclick="closePopup()">&times;</span>

        <h2>Edit Employee</h2>

        <input type="text" id="editName">
        <input type="text" id="editEmail">
        <input type="text" id="editDept">

        <button onclick="updateEmployee()">Update</button>
    </div>
</div>

<div id="confirmBox" class="popup">
    <div class="popup-content fade-in">
        <h3>Are you sure?</h3>
        <p>Do you want to delete this employee?</p>

        <button onclick="confirmDelete()">Yes</button>
        <button onclick="closeConfirm()">Cancel</button>
    </div>
</div>


</body>
</html>
